    <rect x="942" y="714" width="98" height="38" rx="18" fill="#101A2B" stroke="#475569"/>
    <text x="991" y="738" text-anchor="middle" fill="#F8FAFC" font-size="15" font-family="Arial, sans-serif" font-weight="700">Zone</text>
