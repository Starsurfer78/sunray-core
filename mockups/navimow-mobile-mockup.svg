    <text x="1103" y="738" text-anchor="middle" fill="#F8FAFC" font-size="15" font-family="Arial, sans-serif" font-weight="700">Punkt löschen</text>
    <rect x="1166" y="714" width="90" height="38" rx="18" fill="#172033" stroke="#7F1D1D"/>
