    <rect x="1032" y="676" width="76" height="28" rx="14" fill="#0F172A" stroke="#1E3A5F"/>
    <text x="1070" y="694" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Arial, sans-serif">3 Zonen</text>
    <rect x="1116" y="676" width="92" height="28" rx="14" fill="#0F172A" stroke="#1E3A5F"/>
