name: sunray_mobile
description: Mobile companion app for sunray-core / Alfred
publish_to: "none"
version: 1.3.0+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  multicast_dns: ^0.3.3
  web_socket_channel: ^3.0.1
  dio: ^5.7.0
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  package_info_plus: ^8.0.2
  open_filex: ^4.5.0
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.3
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
